# Spring Application Name
spring.application.name=Web Services Platform

# Spring DataSource Configuration

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Spring Data JPA Configuration
spring.jpa.show-sql=true
spring.datasource.url=jdbc:mysql://localhost/soulware_customersdb
spring.datasource.username=root
spring.datasource.password=clave

# Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.soulware.platform.customerservice.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy
# Elements take their values from maven pom.xml build-related information
documentation.application.description=@project.description@
documentation.application.version=@project.version@


logging.level.org.springframework.ws.server.MessageTracing.received=DEBUG
logging.level.org.springframework.ws.server.MessageTracing.sent=DEBUG


# application.properties
logging.file.name=/home/LogFiles/Application/app.log
logging.level.root=INFO